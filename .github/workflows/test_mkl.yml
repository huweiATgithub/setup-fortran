name: Test MKL
# Workflow has two modes: assert and report
# Push and pull request run in assert mode.
# Schedule and dispatch run in report mode.
on:
  push:
    paths-ignore:
      - "**.md"
    tags-ignore:
      - v**
  pull_request:
    branches:
      - main
      - develop*
    paths-ignore:
      - "**.md"
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  test:
    name: Test MKL
    strategy:
      matrix:
        os: [windows-2019, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Fortran with MKL
        id: setup-fortran
        uses: ./
        with:
          compiler: intel
          version: 2025.0.0
          extra_components: intel.oneapi.win.mkl.devel

      - name: List the installed directories
        shell: pwsh
        run: |
          Push-Location "${{ env.ONEAPI_ROOT }}"
          Get-ChildItem -Recurse -Directory | Foreach-Object { $_.FullName.Substring($pwd.Path.Length + 1) }
          Pop-Location

      - name: List the installed lib and dll
        shell: pwsh
        run: |
          Push-Location "${{ env.ONEAPI_ROOT }}"
          Get-ChildItem -Recurse -File -Include *.lib,*.dll | Foreach-Object { $_.FullName.Substring($pwd.Path.Length + 1) }
          Pop-Location

  test-classic:
    name: Test MKL (classic)
    strategy:
      matrix:
        os: [windows-2019, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Fortran with MKL
        id: setup-fortran
        uses: ./
        with:
          compiler: intel-classic
          version: 2021.12
          extra_components: intel.oneapi.win.mkl.devel

      - name: List the installed directories
        shell: pwsh
        run: |
          Push-Location "${{ env.ONEAPI_ROOT }}"
          Get-ChildItem -Recurse -Directory | Foreach-Object { $_.FullName.Substring($pwd.Path.Length + 1) }
          Pop-Location

      - name: List the installed lib and dll
        shell: pwsh
        run: |
          Push-Location "${{ env.ONEAPI_ROOT }}"
          Get-ChildItem -Recurse -File -Include *.lib,*.dll | Foreach-Object { $_.FullName.Substring($pwd.Path.Length + 1) }
          Pop-Location
